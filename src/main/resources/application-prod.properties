spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reservations}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:reservations}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:reservations}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
