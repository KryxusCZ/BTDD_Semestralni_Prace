services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reservations
      POSTGRES_USER: reservations
      POSTGRES_PASSWORD: reservations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservations"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reservations
      SPRING_DATASOURCE_USERNAME: reservations
      SPRING_DATASOURCE_PASSWORD: reservations
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
