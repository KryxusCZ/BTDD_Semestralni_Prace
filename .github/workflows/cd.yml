name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (e.g. main, v1.0.0, sha-abc1234)'
        required: true
        default: 'main'
  push:
    tags:
      - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    environment: staging

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Determine image tag
        id: tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=${{ github.event.inputs.image_tag }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.ref }}" -like "refs/tags/*") {
            $t = "${{ github.ref }}" -replace "refs/tags/", ""
            echo "tag=$t" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=main" >> $env:GITHUB_OUTPUT
          }

      - name: Apply namespaces
        shell: powershell
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply staging manifests
        shell: powershell
        run: kubectl apply -f k8s/staging/

      - name: Update staging image
        shell: powershell
        run: |
          kubectl set image deployment/reservations `
            reservations=ghcr.io/kryxuscz/btdd_semestralni_prace:${{ steps.tag.outputs.tag }} `
            -n reservations-staging

      - name: Wait for rollout
        shell: powershell
        run: kubectl rollout status deployment/reservations -n reservations-staging --timeout=180s

      - name: Smoke test
        shell: powershell
        run: |
          Start-Job { kubectl port-forward svc/reservations 8080:80 -n reservations-staging }
          Start-Sleep -Seconds 10
          Invoke-WebRequest -UseBasicParsing http://localhost:8080/actuator/health

  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/')
    environment: production

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract version tag
        id: tag
        shell: powershell
        run: |
          $t = "${{ github.ref }}" -replace "refs/tags/", ""
          echo "tag=$t" >> $env:GITHUB_OUTPUT

      - name: Apply prod manifests
        shell: powershell
        run: kubectl apply -f k8s/prod/

      - name: Update prod image
        shell: powershell
        run: |
          kubectl set image deployment/reservations `
            reservations=ghcr.io/kryxuscz/btdd_semestralni_prace:${{ steps.tag.outputs.tag }} `
            -n reservations-prod

      - name: Wait for rollout
        shell: powershell
        run: kubectl rollout status deployment/reservations -n reservations-prod --timeout=180s

      - name: Rollback on failure
        if: failure()
        shell: powershell
        run: kubectl rollout undo deployment/reservations -n reservations-prod
