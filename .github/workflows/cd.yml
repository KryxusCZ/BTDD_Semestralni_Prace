name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      startsWith(github.ref, 'refs/tags/')
    environment: staging

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=main" >> $GITHUB_OUTPUT
          fi

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply staging manifests
        run: kubectl apply -f k8s/staging/

      - name: Update staging image
        run: |
          kubectl set image deployment/reservations \
            reservations=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} \
            -n reservations-staging

      - name: Wait for rollout
        run: kubectl rollout status deployment/reservations -n reservations-staging --timeout=120s

      - name: Smoke test
        run: |
          kubectl port-forward svc/reservations 8080:80 -n reservations-staging &
          sleep 5
          curl -f http://localhost:8080/actuator/health || exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/')
    environment: production

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Extract version tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Apply prod manifests
        run: kubectl apply -f k8s/prod/

      - name: Update prod image
        run: |
          kubectl set image deployment/reservations \
            reservations=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} \
            -n reservations-prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/reservations -n reservations-prod --timeout=180s

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/reservations -n reservations-prod
