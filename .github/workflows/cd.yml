name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (e.g. main, v1.0.0, sha-abc1234)'
        required: true
        default: 'main'
  push:
    tags:
      - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    environment: staging

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Check kubeconfig secret
        id: check_secret
        run: |
          if [[ -z "${{ secrets.KUBECONFIG_STAGING }}" ]]; then
            echo "KUBECONFIG_STAGING secret is not set — skipping cluster deployment."
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubeconfig
        if: steps.check_secret.outputs.available == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Determine image tag
        if: steps.check_secret.outputs.available == 'true'
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=main" >> $GITHUB_OUTPUT
          fi

      - name: Apply namespaces
        if: steps.check_secret.outputs.available == 'true'
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply staging manifests
        if: steps.check_secret.outputs.available == 'true'
        run: kubectl apply -f k8s/staging/

      - name: Update staging image
        if: steps.check_secret.outputs.available == 'true'
        run: |
          kubectl set image deployment/reservations \
            reservations=ghcr.io/kryxuscz/btdd_semestralni_prace:${{ steps.tag.outputs.tag }} \
            -n reservations-staging

      - name: Wait for rollout
        if: steps.check_secret.outputs.available == 'true'
        run: kubectl rollout status deployment/reservations -n reservations-staging --timeout=120s

      - name: Smoke test
        if: steps.check_secret.outputs.available == 'true'
        run: |
          kubectl port-forward svc/reservations 8080:80 -n reservations-staging &
          sleep 5
          curl -f http://localhost:8080/actuator/health || exit 1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/')
    environment: production

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Extract version tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Apply prod manifests
        run: kubectl apply -f k8s/prod/

      - name: Update prod image
        run: |
          kubectl set image deployment/reservations \
            reservations=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} \
            -n reservations-prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/reservations -n reservations-prod --timeout=180s

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/reservations -n reservations-prod
