name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. main, v1.0.0)'
        required: true
        default: 'main'
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    environment: staging

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine image tag
        id: tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=${{ github.event.inputs.image_tag }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event.workflow_run.head_branch }}" -match "^v\d") {
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=main" >> $env:GITHUB_OUTPUT
          }

      - name: Apply namespaces
        shell: powershell
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply staging manifests
        shell: powershell
        run: kubectl apply -f k8s/staging/

      - name: Update staging image
        shell: powershell
        run: |
          kubectl set image deployment/reservations `
            reservations=ghcr.io/kryxuscz/btdd_semestralni_prace:${{ steps.tag.outputs.tag }} `
            -n reservations-staging

      - name: Wait for rollout
        shell: powershell
        run: kubectl rollout status deployment/reservations -n reservations-staging --timeout=300s

      - name: Smoke test
        shell: powershell
        run: |
          kubectl exec deployment/reservations -n reservations-staging -- wget -q -O- http://localhost:8080/actuator/health

  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: deploy-staging
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine image tag
        id: tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "tag=${{ github.event.inputs.image_tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> $env:GITHUB_OUTPUT
          }

      - name: Apply prod manifests
        shell: powershell
        run: kubectl apply -f k8s/prod/

      - name: Update prod image
        shell: powershell
        run: |
          kubectl set image deployment/reservations `
            reservations=ghcr.io/kryxuscz/btdd_semestralni_prace:${{ steps.tag.outputs.tag }} `
            -n reservations-prod

      - name: Wait for rollout
        shell: powershell
        run: kubectl rollout status deployment/reservations -n reservations-prod --timeout=600s

      - name: Rollback on failure
        if: failure()
        shell: powershell
        run: kubectl rollout undo deployment/reservations -n reservations-prod
